<!DOCTYPE html>
<html>

<head>
    <link rel="stylesheet" href="style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body class="user">

    <div class="container">

        <!-- NAV -->
        <div class="nav user-nav">
            <span>Chart</span>
            <span onclick="goTransactions()">Transactions</span>
            <span onclick="goHome()">Home</span>
        </div>

        <h2>Book Availability</h2>

        <!-- FORM -->
        <div class="card">

            <!-- FORM ADDED FOR ENTER KEY -->
            <form onsubmit="handleSearch(event)">

                <label>Enter Book Name</label>
                <input list="bookList" id="bookName" placeholder="Enter Book Name" oninput="filterAuthors()">
                <datalist id="bookList"></datalist>

                <label>Enter Author</label>
                <select id="author">
                    <option value="">Select Author</option>
                </select>

                <!-- BUTTON GROUP -->
                <div class="actions">
                    <button type="submit">Search</button>
                    <button type="button" onclick="goTransactions()">Back</button>
                    <button type="button" onclick="resetSearch()">Reset</button>
                </div>

            </form>

        </div>

        <!-- RESULTS (changed from grid → normal div) -->
        <div id="results"></div>

        <!-- LOGOUT -->
        <div class="actions">
            <button onclick="logout()">Log Out</button>
            <button type="button" onclick="confirmBook()">Confirm</button>
        </div>

    </div>

    <script src="script.js"></script>
    <div id="toast" class="toast"></div>
</body>

</html>
