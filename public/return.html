<!DOCTYPE html>
<html>

<head>
    <link rel="stylesheet" href="style.css">
</head>

<body class="user">

    <div class="container">

        <!-- NAV -->
        <div class="nav user-nav">
            <span onclick="goTransactions()">Back</span>
            <span onclick="goTransactions()">Transactions</span>
            <span onclick="goHome()">Home</span>
        </div>

        <h2>Return Book</h2>

        <div class="card">

            <label>Enter Book Name</label>
            <input list="returnBookList" id="returnBookName" oninput="loadReturnDetails()">
            <datalist id="returnBookList"></datalist>

            <label>Enter Author</label>
            <input id="returnAuthor" disabled>

            <label>Serial No</label>
            <select id="serialNo"></select>

            <label>Issue Date</label>
            <input id="issueDateReturn" disabled>

            <label>Return Date</label>
            <input type="date" id="returnDateReturn">

            <label>Remarks</label>
            <textarea id="remarksReturn"></textarea>

            <div class="actions">
                <button onclick="submitReturn()">Confirm</button>
                <button onclick="goTransactions()">Cancel</button>
            </div>

        </div>

    </div>

    <script src="script.js"></script>
    <div id="toast" class="toast"></div>
</body>

</html>
